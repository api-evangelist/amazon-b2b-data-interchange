apis:
  - aid: amazon-b2b-data-interchange:aws-b2b-data-interchange-api
    name: AWS B2B Data Interchange API
    description: >-
      The AWS B2B Data Interchange API provides programmatic access to manage
      EDI transformation workflows, trading partner profiles, capabilities,
      partnerships, and transformers. It enables creation and management of
      inbound and outbound EDI pipelines using X12 standards and supports
      AI-assisted mapping template generation via Amazon Bedrock.
