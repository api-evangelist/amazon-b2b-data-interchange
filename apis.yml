aid: amazon-b2b-data-interchange
name: Amazon B2B Data Interchange
description: >-
  AWS B2B Data Interchange is a fully managed service that automates the
  transformation and exchange of electronic data interchange (EDI) documents
  at cloud scale. It enables businesses to onboard trading partners, transform
  X12 EDI documents to and from JSON or XML, and manage capabilities,
  profiles, and partnerships with pay-as-you-go pricing. The service supports
  supply chain, healthcare, and financial services workflows and leverages
  Amazon Bedrock for AI-assisted mapping generation.
