    contact:
      - FN: AWS Support
        url: https://aws.amazon.com/contact-us/
    features:
      - name: EDI Transformation
        description: >-
          Transform X12 EDI documents to JSON or XML and generate EDI from
          JSON/XML data inputs, automating inbound and outbound EDI workflows.
      - name: AI-Assisted Mapping
        description: >-
          Use Amazon Bedrock to automatically generate mapping templates,
          reducing mapping code development time by up to 50%.
      - name: Trading Partner Management
        description: >-
          Onboard and manage trading partners through profiles, capabilities,
          and partnerships with visibility into transactional communications.
      - name: EDI Splitting
        description: >-
          Split inbound X12 EDI documents containing multiple transactions into
          individually processed single-transaction documents, supporting files
          up to 5GB.
      - name: HIPAA Compliance
        description: >-
          Supports secure exchange of protected health information for
          healthcare EDI workflows in compliance with HIPAA requirements.
    useCases:
      - name: Supply Chain Partner Onboarding
        description: >-
          Automate onboarding of trading partners in supply chain networks,
          enabling rapid EDI integration without custom development.
      - name: Healthcare Claims Processing
        description: >-
          Streamline healthcare enrollment and claims processing workflows
          using X12 EDI standards with HIPAA-compliant data exchange.
      - name: Financial Transaction Processing
        description: >-
          Expedite complex financial transactions like mortgage applications
          and tax assessments through automated EDI transformation.
    integrations:
      - name: AWS Transfer Family
        description: >-
          Integrate with AWS Transfer Family for managed file transfer
          ingestion workflows into the B2B Data Interchange pipeline.
      - name: Amazon S3
        description: >-
          Monitor S3 locations for inbound EDI documents and write transformed
          outputs to S3 buckets for downstream processing.
      - name: Amazon EventBridge
        description: >-
          Trigger event-driven workflows from EDI transformation events using
          Amazon EventBridge integration.
      - name: Amazon Bedrock
        description: >-
          Leverage Amazon Bedrock generative AI for automated mapping template
          generation from source and target schemas.
    solutions:
      - name: EDI Modernization
        description: >-
          Migrate from legacy EDI infrastructure to a cloud-native managed
          service with pay-as-you-go pricing and no upfront investment.
      - name: Multi-Partner EDI Network
        description: >-
          Build and manage multi-partner EDI networks with centralized
          visibility and standardized transformation pipelines.
